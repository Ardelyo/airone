name: AirOne CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --tb=short -q

      - name: Run coverage
        if: matrix.python-version == '3.11'
        run: |
          pytest tests/ --cov=airone --cov-report=xml -q
          echo "Coverage complete"

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check airone/ --select E,F,I

      - name: Run mypy
        run: mypy airone/ --ignore-missing-imports

  benchmark:
    name: Benchmark Smoke Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke benchmark
        run: |
          python -c "
          from airone.benchmarks.runner import BenchmarkRunner
          import tempfile, os
          from pathlib import Path

          with tempfile.TemporaryDirectory() as tmp:
              f = Path(tmp) / 'test.txt'
              f.write_bytes(b'AirOne CI smoke test. ' * 5000)
              runner = BenchmarkRunner()
              report = runner.run([str(f)], strategies=['traditional_zstd'])
              assert len(report.records) > 0
              assert all(r.lossless_verified for r in report.records if not r.error)
              print('Smoke benchmark PASSED')
              report.print_table()
          "
